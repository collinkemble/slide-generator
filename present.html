<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    /* ─── Loading Screen ─── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 90;
      background: #000; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; gap: 12px;
    }
    .spinner {
      width: 24px; height: 24px; border: 3px solid #333; border-top-color: #0176D3;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Slide Viewer ─── */
    #viewer {
      display: none;
      position: fixed; inset: 0;
      background: #000;
      cursor: none;
    }
    #viewer.show-cursor { cursor: default; }

    #slide-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    #slide-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      transition: opacity 0.2s ease;
      user-select: none; -webkit-user-drag: none;
    }
    #slide-img.loading { opacity: 0.3; }

    /* ─── Controls Overlay ─── */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      display: flex; align-items: center; justify-content: space-between;
      opacity: 0; transition: opacity 0.3s ease;
      z-index: 10;
    }
    #viewer.show-cursor #controls { opacity: 1; }

    #slide-counter {
      color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .control-btn {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      width: 40px; height: 40px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: background 0.2s;
    }
    .control-btn:hover { background: rgba(255,255,255,0.3); }

    #nav-buttons { display: flex; gap: 8px; align-items: center; }

    #fullscreen-btn {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500; transition: background 0.2s;
    }
    #fullscreen-btn:hover { background: rgba(255,255,255,0.3); }

    /* ─── Error Screen ─── */
    #error-screen {
      display: none; position: fixed; inset: 0; z-index: 80;
      background: #111; color: #fff;
      flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    }
    #error-screen h2 { font-size: 20px; }
    #error-screen p { color: #999; font-size: 14px; max-width: 400px; text-align: center; }
    #error-screen a { color: #0176D3; text-decoration: none; font-size: 14px; }
    #error-screen a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <span>Loading presentation...</span>
  </div>

  <!-- Main Viewer -->
  <div id="viewer">
    <div id="slide-container">
      <img id="slide-img" alt="Presentation slide">
    </div>
    <div id="controls">
      <span id="slide-counter">1 / 1</span>
      <div id="nav-buttons">
        <button class="control-btn" onclick="prevSlide()" title="Previous slide">◀</button>
        <button class="control-btn" onclick="nextSlide()" title="Next slide">▶</button>
      </div>
      <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>
  </div>

  <!-- Error Screen -->
  <div id="error-screen">
    <h2 id="error-title">Unable to load presentation</h2>
    <p id="error-message">Something went wrong.</p>
    <a id="error-link" href="/" style="display:none">Go to Slide Builder →</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/magic-sdk/dist/magic.js"></script>
  <script>
    let slides = [];
    let currentSlide = 0;
    let cursorTimeout = null;

    const shareToken = window.location.pathname.split('/present/')[1]?.split('?')[0]?.split('/')[0];

    // ─── Cookie helpers (same as main app) ───
    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? decodeURIComponent(match[2]) : null;
    }

    // ─── Init: use existing Magic Link session ───
    async function init() {
      if (!shareToken) return showError('Invalid presentation link');

      // Step 1: Try loading without auth (public presentations work immediately)
      const publicResult = await loadPresentation();
      if (publicResult === 'ok') return;

      // Step 2: If auth is required, check existing Magic Link session
      // (same SSO session used by the main Slide Builder app)
      let userEmail = null;
      try {
        const configResp = await fetch('/api/auth/config');
        const config = await configResp.json();
        const magicKey = config.magicPublishableKey;

        if (magicKey) {
          const magic = new Magic(magicKey);
          const isLoggedIn = await magic.user.isLoggedIn();
          if (isLoggedIn) {
            const info = await magic.user.getInfo();
            userEmail = info.email;
          }
        }
      } catch (err) {
        console.log('Magic session check:', err.message);
      }

      if (userEmail) {
        // User is already logged in — try loading with their email
        const authResult = await loadPresentation(userEmail);
        if (authResult === 'ok') return;

        // Auth failed even with email — show appropriate error
        if (authResult === 'salesforce') {
          showError(
            'This presentation is restricted to Salesforce employees.',
            'You are signed in as ' + userEmail + ' but this presentation requires a @salesforce.com email.',
            true
          );
        } else if (authResult === 'owner') {
          showError(
            'Private Presentation',
            'This presentation is private and can only be viewed by its owner.',
            true
          );
        } else {
          showError('Unable to load presentation', authResult);
        }
      } else {
        // Not logged in — redirect to main app login
        if (publicResult === 'salesforce' || publicResult === 'owner') {
          showError(
            'Sign in required',
            'Please sign in to Slide Builder to view this presentation.',
            true
          );
        } else {
          showError('Unable to load presentation', publicResult);
        }
      }
    }

    async function loadPresentation(email) {
      try {
        const url = `/api/present/${shareToken}/data` + (email ? `?email=${encodeURIComponent(email)}` : '');
        const resp = await fetch(url);
        const data = await resp.json();

        if (!resp.ok) {
          if (data.requiresAuth) return data.authType;
          return data.error || 'Failed to load';
        }

        slides = data.slides || [];
        if (slides.length === 0) return 'No slides found in this presentation';

        document.title = data.name || 'Presentation';

        // Preload first few images
        slides.forEach((s, i) => {
          if (i < 3 && s.imageUrl) {
            const img = new Image();
            img.src = s.imageUrl;
          }
        });

        // Show viewer
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('viewer').style.display = 'block';
        showSlide(0);
        return 'ok';
      } catch (err) {
        return 'Failed to load presentation: ' + err.message;
      }
    }

    function showSlide(index) {
      if (index < 0 || index >= slides.length) return;
      currentSlide = index;

      const img = document.getElementById('slide-img');
      const slide = slides[index];

      if (slide.imageUrl) {
        img.classList.add('loading');
        const preload = new Image();
        preload.onload = () => {
          img.src = slide.imageUrl;
          img.classList.remove('loading');
        };
        preload.onerror = () => {
          img.src = '';
          img.alt = 'Failed to load slide';
          img.classList.remove('loading');
        };
        preload.src = slide.imageUrl;
      } else {
        img.src = '';
        img.alt = slide.title || 'Slide ' + (index + 1);
      }

      document.getElementById('slide-counter').textContent = `${index + 1} / ${slides.length}`;

      // Preload next 2 slides
      for (let i = 1; i <= 2; i++) {
        const next = slides[index + i];
        if (next?.imageUrl) {
          const p = new Image();
          p.src = next.imageUrl;
        }
      }
    }

    function nextSlide() { showSlide(currentSlide + 1); }
    function prevSlide() { showSlide(currentSlide - 1); }

    // ─── Keyboard Navigation ───
    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowRight': case 'ArrowDown': case ' ': case 'PageDown':
          e.preventDefault(); nextSlide(); break;
        case 'ArrowLeft': case 'ArrowUp': case 'Backspace': case 'PageUp':
          e.preventDefault(); prevSlide(); break;
        case 'Home': e.preventDefault(); showSlide(0); break;
        case 'End': e.preventDefault(); showSlide(slides.length - 1); break;
        case 'Escape':
          if (document.fullscreenElement) document.exitFullscreen();
          break;
        case 'f': case 'F':
          e.preventDefault(); toggleFullscreen(); break;
      }
    });

    // ─── Click Navigation ───
    document.getElementById('slide-container').addEventListener('click', (e) => {
      if (e.target.closest('#controls')) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if (x < rect.width * 0.3) prevSlide();
      else nextSlide();
    });

    // ─── Touch/Swipe ───
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) {
        if (dx < 0) nextSlide();
        else prevSlide();
      }
    }, { passive: true });

    // ─── Cursor auto-hide ───
    document.addEventListener('mousemove', () => {
      document.getElementById('viewer').classList.add('show-cursor');
      clearTimeout(cursorTimeout);
      cursorTimeout = setTimeout(() => {
        document.getElementById('viewer').classList.remove('show-cursor');
      }, 3000);
    });

    // ─── Fullscreen ───
    function toggleFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }

    // ─── Error ───
    function showError(title, msg, showLoginLink) {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('error-screen').style.display = 'flex';
      document.getElementById('error-title').textContent = title || 'Unable to load presentation';
      document.getElementById('error-message').textContent = msg || 'Something went wrong.';
      if (showLoginLink) {
        const link = document.getElementById('error-link');
        link.style.display = 'inline';
        link.href = '/';
      }
    }

    // ─── Start ───
    init();
  </script>
</body>
</html>
